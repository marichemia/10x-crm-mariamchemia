<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10x CRM - Clients</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="app-page">
    <header class="header">
        <a href="./dashboard.html" class="logo">10x CRM</a>
        <nav>
            <a href="./dashboard.html" class="nav-link">Dashboard</a>
            <a href="./clients.html" class="nav-link active">Clients</a>
            <a href="./profile.html" class="nav-link">Profile</a>
        </nav>
        <div class="app-actions">
            <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Switch Theme">
                <span class="toggle-icon"></span>
            </button>
            <button type="button" id="logout-button" class="logout-button">Logout</button>
        </div>
    </header>
    <main class="clients-content">
        <section class="clients-header">
            <h1>Clients</h1>
            <button type="button" id="add-client-btn" class="add-client-btn">+ Add Client</button>
        </section>
        <section class="clients-toolbar">
            <input type="search" id="client-search" class="client-search" placeholder="Search by name or company...">
            <div class="status-filters">
                <button type="button" class="status-filter active" data-status="All">All</button>
                <button type="button" class="status-filter" data-status="Lead">Lead</button>
                <button type="button" class="status-filter" data-status="Contacted">Contacted</button>
                <button type="button" class="status-filter" data-status="Won">Won</button>
                <button type="button" class="status-filter" data-status="Lost">Lost</button>
            </div>
            <select id="clients-sort" class="clients-sort">
                <option value="newest">Newest</option>
                <option value="name">Name</option>
                <option value="value">Deal Value: High to Low</option>
            </select>
        </section>
        <section class="clients-results">
            <p id="clients-loading" class="clients-message">Loading Clients...</p>
            <div id="clients-error" class="clients-error" hidden>
                <p> Could not load clients. Please try again.</p>
                <button type="button" id="retry-clients-button" class="retry-clients-button">Retry</button>
            </div>
            <div class="clients-list" id="clients-list"></div>
        </section>
        <div class="pagination">
            <button type="button" id="prev-pg-btn" class="pagination-btn">Prev</button>
            <span id="pg-info"></span>
            <button type="button" id="next-pg-btn" class="pagination-btn">Next</button>  
        </div>
    </main>
    <div class="modal-window" id="modal-window" hidden>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add Client</h2>
                <button type="button" id="close-modal-btn" class="close-modal-btn" aria-label="Close Form Window">&times;</button>
            </div>
            <form id="client-form" novalidate>
                <label for="client-full-name"></label>
                <input type="text" id="client-full-name">
                <p class="form-error" id="client-name-error"></p>

                <label for="client-email">Email</label>
                <input type="email" id="client-email">
                <p class="form-error" id="client-email-error"></p>

                <label for="client-phone">Phone</label>
                <input type="text" id="client-phone">
                <p class="form-error" id="client-phone-error"></p>

                <label for="client-company">Company</label>
                <input type="text" id="client-company">
                
                <label for="client-status">Status</label>
                <select id="client-status" required>
                    <option value="Lead">Lead</option>
                    <option value="Contacted">Contacted</option>
                    <option value="Won">Won</option>
                    <option value="Lost">Lost</option>
                </select>

                <label for="client-value">Deal Value</label>
                <input type="number" id="client-value">
                <p class="form-error" id="client-value-error"></p>
                
                <button type="submit" class="save-btn">Save</button>
            </form>
        </div>
    </div>
    <div class="modal-window" id="client-details-modal" hidden>
        <div class="modal-content client-details-window">
            <div  class="modal-header">
                <div class="client-details-avatar" id="client-details-avatar"></div>
                <h2 id="client-details-name">Client Details</h2>
                <button class="close-modal-btn" id="close-client-details-btn" type="button"> &times;</button>
            </div>
            <div class="client-details-content" id="client-details-content">
                <p>
                    <strong>Email:</strong>
                    <span id="client-details-email"></span>
                </p>
                <p>
                    <strong>Phone:</strong>
                    <span id="client-details-phone"></span>
                </p>
                <p>
                    <strong>Company:</strong>
                    <span id="client-details-company"></span>
                </p>
                <p>
                    <strong>Status:</strong>
                    <span id="client-details-status"></span>
                </p>
                <p>
                    <strong>Deal Value:</strong>
                    <span id="client-details-value"></span>
                </p>
                <p>
                    <strong>Client Since:</strong>
                    <span id="client-details-created-at"></span>
                </p>
            </div>
            <section class="client-notes">
                <h3>Notes</h3>
                <p id="client-notes-empty" class="client-notes-empty">No Existing Notes.</p>
                <ul id="client-notes-list" class="client-notes-list"></ul>
                <form id="client-note-form" class="client-note-form">
                    <label for="client-note-input">Add a Note</label>
                    <textarea id="client-note-input" rows="3" maxlength="500" placeholder="Add a note..." required></textarea>
                    <button type="submit" class="add-note-btn">Add Note</button>
                </form>
            </section>
            <button type="button" id="client-reminder-btn" class="client-reminder-btn"> Remind me in 1 minute </button>
        </div>
    </div>
    <div class="client-toast" id="client-toast" hidden></div>
    <script type="module" src="./js/clients.js"></script>
</body>
</html>

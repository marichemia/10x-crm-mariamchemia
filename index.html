<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10x CRM - Sign In</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="auth-page">
    <main class="auth-container">
        <section class="auth-card">
            <p class="auth-logo">10X CRM</p>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to continue</p>
            <form id="login-form" class="auth-form" novalidate>
                <div class="form-field">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-input" autocomplete="email">
                    <p id="email-error" class="form-error"></p>
                </div>
                <div class="form-field">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" autocomplete="current-password">
                    <p id="password-error" class="form-error"></p>
                </div>
                <button type="submit" class="primary-button">Sign In</button>
            </form>
            <p id="login-error" class="auth-error" aria-live="polite"></p>
            <p class="auth-footer">Don't have an account? <a href="./signup.html" class="auth-link">Sign up</a></p>
        </section>
    </main>
    <script type="module" src="./js/auth.js"></script>
</body>
</html>
